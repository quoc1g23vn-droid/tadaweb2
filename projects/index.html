<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tad.atelier - Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-427ELYXSX3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-427ELYXSX3');
    </script>

    <style>
        .desc {
            z-index: 100;
            display: none;
            width: 100%;
            text-align: center;
        }
        .bg-desc {
            display: none;
            top: 0px;
            position: absolute;
            height: 100%;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 99;
        }
        a {
            position: relative;
            display: inline-block;
        }
        a:hover>.desc {
            display: block;
        }
        a:hover>.bg-desc {
            display: block;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand navbar-light bg-light d-flex bd-highlight">
        <div class="container">
            <a class="navbar-brand" href="/"><b>Tad.atelier</b></a>
            <div class="p-2">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/projects">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about-us">About Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 70px;">
        <div id="projects-grid" class="row gx-1 mt-1">
            <!-- Projects will be rendered here by JavaScript -->
        </div>
    </div>

    <!-- Projects Data -->
    <script src="/assets/js/projects-data.js"></script>

    <!-- Render Projects -->
    <script>
        (function() {
            const grid = document.getElementById('projects-grid');
            const projectsPerRow = 3;

            projectsData.forEach((project, index) => {
                // Create new row every 3 projects
                if (index % projectsPerRow === 0) {
                    var rowDiv = document.createElement('div');
                    rowDiv.className = 'row gx-1 mt-1';
                    grid.appendChild(rowDiv);
                }

                // Find the current row
                const rows = grid.querySelectorAll('.row.gx-1');
                const currentRow = rows[rows.length - 1];

                // Create project card
                const colDiv = document.createElement('div');
                colDiv.className = 'col-md-4';
                colDiv.innerHTML = `
                    <a href="/projects/${project.folder}">
                        <img src="${project.thumbnail}" class="img-fluid" alt="${project.name}">
                        <span class="bg-desc"></span>
                        <span class="desc overflow-hidden position-absolute top-50 start-50 translate-middle text-white">
                            ${project.name} | ${project.year}</span>
                    </a>
                `;
                currentRow.appendChild(colDiv);
            });
        })();
    </script>
</body>

</html>
